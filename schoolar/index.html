<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Scholar Scraper</title>

    <link rel="stylesheet"
          href="https://pyscript.net/releases/2024.1.1/core.css">

    <script type="module"
            src="https://pyscript.net/releases/2024.1.1/core.js">
    </script>

    <style>

        body{
            font-family:Arial, sans-serif;
            background:#f5f7fb;
            margin:0;
            padding:30px;
        }

        .container{
            max-width:1000px;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        h1{
            color:#1F4E79;
            margin-top:0;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
            margin-top:10px;
            box-sizing:border-box;
        }

        button{
            margin-top:15px;
            padding:12px 20px;
            border:none;
            background:#1F4E79;
            color:white;
            border-radius:5px;
            cursor:pointer;
            font-size:15px;
        }

        button:hover{
            background:#163a5c;
        }

        #output{
            background:#111;
            color:#00ff88;
            padding:15px;
            border-radius:8px;
            margin-top:20px;
            min-height:200px;
            white-space:pre-wrap;
            overflow:auto;
        }

    </style>

    <py-config>
        packages = [
            "requests",
            "beautifulsoup4",
            "openpyxl"
        ]
    </py-config>

</head>

<body>

<div class="container">

    <h1>Google Scholar Scraper</h1>

    <p>
        Masukkan Google Scholar ID atau URL
    </p>

    <input
        type="text"
        id="scholarInput"
        placeholder="Contoh: C74trMkAAAAJ"
    >

    <button py-click="run_scraper()">
        Ambil Data & Export Excel
    </button>

    <div id="output"></div>

</div>

<py-script src="./scholar_scraper.py"></py-script>

</body>
</html>
