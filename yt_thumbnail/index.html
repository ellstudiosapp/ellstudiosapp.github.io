<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouTube Thumbnail V3</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:30px;
    background:#0f0f0f;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h2{
    margin-bottom:25px;
}

input{
    width:70%;
    max-width:700px;
    padding:14px;
    border:none;
    border-radius:10px;
    outline:none;
    background:#1d1d1d;
    color:white;
    font-size:15px;
}

button{
    padding:14px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.search-btn{
    background:#00ffcc;
    color:#000;
}

.loading{
    margin-top:20px;
    color:#00ffcc;
}

.thumb-container{
    margin-top:30px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.thumb{
    width:340px;
    background:#1a1a1a;
    border-radius:14px;
    overflow:hidden;
    padding:12px;
}

.thumb img{
    width:100%;
    border-radius:10px;
}

.title{
    margin-top:10px;
    font-weight:bold;
    line-height:1.5;
}

.date{
    margin-top:5px;
    color:#aaa;
    font-size:13px;
}

.actions{
    margin-top:15px;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.download{
    display:inline-block;
    padding:10px 14px;
    background:#00ffcc;
    color:#000;
    text-decoration:none;
    border-radius:8px;
    font-size:14px;
    font-weight:bold;
}

.copybtn{
    background:#ffaa00;
    color:#000;
}

.history{
    margin-top:50px;
}

.history h3{
    margin-bottom:15px;
}

.history a{
    color:#00ffcc;
    display:block;
    margin:8px;
    text-decoration:none;
    word-break:break-all;
}

</style>
</head>

<body>

<h2>🔥 YouTube Thumbnail Scraper</h2>

<div>

    <input
        type="text"
        id="rssInput"
        placeholder="Masukkan RSS YouTube"
        value="https://www.youtube.com/feeds/videos.xml?channel_id=UCw_9u2xhPtFGnmZOZ1gEInw"
    >

    <button class="search-btn" onclick="loadRSS()">
        Ambil Thumbnail
    </button>

</div>

<div id="loading" class="loading"></div>

<div id="result" class="thumb-container"></div>

<div class="history">

    <h3>📜 History Pencarian</h3>
    <div id="historyList"></div>

</div>

<script>

const result =
    document.getElementById("result");

const loading =
    document.getElementById("loading");

const historyList =
    document.getElementById("historyList");

loadHistory();


// =============================
// MAIN LOAD RSS
// =============================
async function loadRSS() {

    const rssUrl =
        document.getElementById("rssInput")
        .value
        .trim();

    if (!rssUrl) return alert("Masukkan RSS URL");

    saveHistory(rssUrl);

    result.innerHTML = "";

    loading.innerHTML =
        "⏳ Mengambil RSS...";

    try {

        const proxy =
            "https://corsproxy.io/?" +
            encodeURIComponent(rssUrl);

        const res =
            await fetch(proxy);

        const xmlText =
            await res.text();

        const parser =
            new DOMParser();

        const xml =
            parser.parseFromString(
                xmlText,
                "application/xml"
            );

        const entries =
            xml.querySelectorAll("entry");

        if (!entries.length) {

            loading.innerHTML =
                "❌ Tidak ada video";

            return;
        }

        loading.innerHTML =
            `🎬 ${entries.length} video ditemukan`;

        entries.forEach(entry => {

            const videoId =
                entry.querySelector(
                    "video\\:videoId"
                )?.textContent;

            const title =
                entry.querySelector("title")
                ?.textContent || "No title";

            const published =
                entry.querySelector("published")
                ?.textContent || "";

            // =============================
            // THUMBNAIL FIX (ANTI RUSAK)
            // =============================
            const thumbMax =
                `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;

            const thumbHQ =
                `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

            const thumbMQ =
                `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;

            const card =
                document.createElement("div");

            card.className = "thumb";

            card.innerHTML = `

                <img
                    src="${thumbMax}"
                    loading="lazy"
                    onerror="
                        if(this.src.includes('maxresdefault')){
                            this.src='${thumbHQ}';
                        } else if(this.src.includes('hqdefault')){
                            this.src='${thumbMQ}';
                        }
                    "
                >

                <div class="title">
                    ${escapeHtml(title)}
                </div>

                <div class="date">
                    📅 ${formatDate(published)}
                </div>

                <div class="actions">

                    <a
                        class="download"
                        href="${thumbHQ}"
                        download="${sanitize(title)}.jpg"
                    >
                        ⬇ Download
                    </a>

                    <button
                        class="copybtn"
                        onclick="copyImage('${thumbHQ}', this)"
                    >
                        📋 Copy Image
                    </button>

                </div>

            `;

            result.appendChild(card);

        });

    } catch (err) {

        console.error(err);

        loading.innerHTML =
            "❌ Gagal mengambil data";
    }
}


// =============================
// COPY IMAGE
// =============================
async function copyImage(url, btn) {

    try {

        const res =
            await fetch(url);

        const blob =
            await res.blob();

        await navigator.clipboard.write([
            new ClipboardItem({
                [blob.type]: blob
            })
        ]);

        const old =
            btn.innerHTML;

        btn.innerHTML =
            "✅ Copied!";

        setTimeout(() => {

            btn.innerHTML = old;

        }, 1500);

    } catch (err) {

        alert("❌ Copy gagal");
        console.error(err);
    }
}


// =============================
// HISTORY (LOCAL STORAGE)
// =============================
function saveHistory(url) {

    let history =
        JSON.parse(
            localStorage.getItem("yt_history")
        ) || [];

    if (!history.includes(url)) {
        history.unshift(url);
    }

    history =
        history.slice(0, 20);

    localStorage.setItem(
        "yt_history",
        JSON.stringify(history)
    );

    loadHistory();
}

function loadHistory() {

    const history =
        JSON.parse(
            localStorage.getItem("yt_history")
        ) || [];

    historyList.innerHTML = "";

    history.forEach(url => {

        const a =
            document.createElement("a");

        a.href = "#";
        a.innerText = url;

        a.onclick = () => {

            document.getElementById("rssInput")
            .value = url;

            loadRSS();
        };

        historyList.appendChild(a);

    });
}


// =============================
// HELPERS
// =============================
function sanitize(str) {

    return str
        .replace(/[^a-zA-Z0-9\- ]/g, "")
        .substring(0, 50);
}

function escapeHtml(text) {

    return text
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

function formatDate(dateStr) {

    const d =
        new Date(dateStr);

    return d.toLocaleDateString(
        "id-ID",
        {
            day:"numeric",
            month:"long",
            year:"numeric"
        }
    );
}

</script>

</body>
</html>
