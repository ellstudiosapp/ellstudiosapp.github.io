<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouTube Thumbnail V4</title>

<style>

body{
    margin:0;
    padding:30px;
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    text-align:center;
}

h2{
    margin-bottom:20px;
}

input{
    width:70%;
    max-width:700px;
    padding:14px;
    border-radius:10px;
    border:none;
    outline:none;
    background:#1c1c1c;
    color:white;
}

button{
    padding:14px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.search-btn{
    background:#00ffcc;
    color:#000;
}

.loading{
    margin-top:20px;
    color:#00ffcc;
}

.container{
    margin-top:30px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    width:340px;
    background:#1a1a1a;
    border-radius:14px;
    padding:12px;
}

.card img{
    width:100%;
    border-radius:10px;
}

.title{
    margin-top:10px;
    font-weight:bold;
    font-size:15px;
}

.date{
    font-size:13px;
    color:#aaa;
    margin-top:5px;
}

.actions{
    margin-top:12px;
    display:flex;
    gap:10px;
    justify-content:center;
}

.download{
    background:#00ffcc;
    color:#000;
    padding:10px 14px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

.copybtn{
    background:#ffaa00;
    color:#000;
    border:none;
    padding:10px 14px;
    border-radius:8px;
}

.history{
    margin-top:50px;
}

.history a{
    display:block;
    color:#00ffcc;
    margin:6px;
    text-decoration:none;
    word-break:break-all;
}

</style>
</head>

<body>

<h2>🔥 YouTube Thumbnail Scraper (FIXED)</h2>

<div>

    <input
        id="rssInput"
        value="https://www.youtube.com/feeds/videos.xml?channel_id=UCw_9u2xhPtFGnmZOZ1gEInw"
        placeholder="RSS URL YouTube"
    >

    <button class="search-btn" onclick="loadRSS()">
        Ambil Thumbnail
    </button>

</div>

<div id="loading" class="loading"></div>

<div id="result" class="container"></div>

<div class="history">
    <h3>📜 History</h3>
    <div id="historyList"></div>
</div>

<script>

const result =
    document.getElementById("result");

const loading =
    document.getElementById("loading");

const historyList =
    document.getElementById("historyList");

loadHistory();


// ============================
// MAIN FUNCTION
// ============================
async function loadRSS() {

    const rss =
        document.getElementById("rssInput")
        .value
        .trim();

    if (!rss) return alert("Masukkan RSS");

    saveHistory(rss);

    result.innerHTML = "";
    loading.innerHTML = "⏳ Loading RSS...";

    try {

        const proxy =
            "https://corsproxy.io/?" +
            encodeURIComponent(rss);

        const res =
            await fetch(proxy);

        const xmlText =
            await res.text();

        const parser =
            new DOMParser();

        const xml =
            parser.parseFromString(
                xmlText,
                "application/xml"
            );

        const entries =
            xml.getElementsByTagName("entry");

        if (!entries.length) {

            loading.innerHTML =
                "❌ Tidak ada video";

            return;
        }

        loading.innerHTML =
            `🎬 ${entries.length} video ditemukan`;

        for (let entry of entries) {

            // ============================
            // FIX VIDEO ID (ANTI UNDEFINED)
            // ============================
            let videoId =
                entry.getElementsByTagName("yt:videoId")[0]?.textContent ||
                entry.getElementsByTagName("videoId")[0]?.textContent;

            if (!videoId) continue;

            const title =
                entry.getElementsByTagName("title")[0]?.textContent ||
                "No title";

            const published =
                entry.getElementsByTagName("published")[0]?.textContent ||
                "";

            // ============================
            // THUMBNAIL (STABLE)
            // ============================
            const thumb =
                `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;

            const card =
                document.createElement("div");

            card.className = "card";

            card.innerHTML = `

                <img
                    src="${thumb}"
                    onerror="
                        this.onerror=null;
                        this.src='https://img.youtube.com/vi/${videoId}/hqdefault.jpg';
                    "
                >

                <div class="title">
                    ${escapeHtml(title)}
                </div>

                <div class="date">
                    📅 ${formatDate(published)}
                </div>

                <div class="actions">

                    <a
                        class="download"
                        href="https://img.youtube.com/vi/${videoId}/hqdefault.jpg"
                        download
                    >
                        Download
                    </a>

                    <button
                        class="copybtn"
                        onclick="copyImage('https://img.youtube.com/vi/${videoId}/hqdefault.jpg', this)"
                    >
                        Copy
                    </button>

                </div>

            `;

            result.appendChild(card);
        }

    } catch (err) {

        console.error(err);

        loading.innerHTML =
            "❌ Gagal load RSS";
    }
}


// ============================
// COPY IMAGE
// ============================
async function copyImage(url, btn) {

    try {

        const res =
            await fetch(url);

        const blob =
            await res.blob();

        await navigator.clipboard.write([
            new ClipboardItem({
                [blob.type]: blob
            })
        ]);

        const old =
            btn.innerHTML;

        btn.innerHTML =
            "✅ Copied";

        setTimeout(() => {
            btn.innerHTML = old;
        }, 1200);

    } catch (e) {

        alert("Gagal copy");
    }
}


// ============================
// HISTORY (LOCAL STORAGE)
// ============================
function saveHistory(url) {

    let data =
        JSON.parse(localStorage.getItem("yt_history")) || [];

    if (!data.includes(url)) {
        data.unshift(url);
    }

    data = data.slice(0, 15);

    localStorage.setItem(
        "yt_history",
        JSON.stringify(data)
    );

    loadHistory();
}

function loadHistory() {

    const data =
        JSON.parse(localStorage.getItem("yt_history")) || [];

    historyList.innerHTML = "";

    data.forEach(url => {

        const a =
            document.createElement("a");

        a.href = "#";
        a.innerText = url;

        a.onclick = () => {

            document.getElementById("rssInput").value = url;
            loadRSS();
        };

        historyList.appendChild(a);
    });
}


// ============================
// HELPERS
// ============================
function escapeHtml(text) {

    return text
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

function formatDate(dateStr) {

    if (!dateStr) return "";

    return new Date(dateStr)
        .toLocaleDateString("id-ID", {
            day:"2-digit",
            month:"long",
            year:"numeric"
        });
}

</script>

</body>
</html>
