<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouTube Thumbnail Scraper</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:30px;
    background:#0f0f0f;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    margin-bottom:25px;
}

.search-box{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

input{
    width:650px;
    max-width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#1d1d1d;
    color:white;
    font-size:15px;
}

button{
    border:none;
    border-radius:12px;
    padding:15px 20px;
    cursor:pointer;
    font-weight:bold;
}

.search-btn{
    background:#00ffc3;
    color:black;
}

.loading{
    margin-top:25px;
    color:#00ffc3;
}

.thumb-container{
    margin-top:30px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.thumb{
    width:340px;
    background:#1b1b1b;
    border-radius:16px;
    overflow:hidden;
    padding:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.thumb img{
    width:100%;
    border-radius:12px;
}

.title{
    margin-top:12px;
    font-weight:bold;
    font-size:15px;
    line-height:1.5;
}

.actions{
    margin-top:15px;
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

.download{
    text-decoration:none;
    background:#00ffc3;
    color:black;
    padding:10px 14px;
    border-radius:10px;
    font-size:14px;
    font-weight:bold;
}

.copybtn{
    background:#ffb100;
    color:black;
}

.history{
    margin-top:60px;
}

.history-item{
    display:block;
    margin:10px 0;
    color:#00ffc3;
    text-decoration:none;
    word-break:break-all;
}

.small{
    margin-top:8px;
    color:#999;
    font-size:13px;
}

</style>
</head>

<body>

<h1>🔥 YouTube Thumbnail Scraper</h1>

<div class="search-box">

    <input
        type="text"
        id="urlInput"
        placeholder="Masukkan URL Channel YouTube"
    >

    <button class="search-btn" onclick="loadChannel()">
        Ambil Thumbnail
    </button>

</div>

<div id="loading" class="loading"></div>

<div id="result" class="thumb-container"></div>

<div class="history">

    <h2>📜 History Pencarian</h2>

    <div id="historyList"></div>

</div>

<script>

const loading = document.getElementById("loading");
const result = document.getElementById("result");
const historyList = document.getElementById("historyList");

loadHistory();


// ========================================
// MAIN
// ========================================
async function loadChannel() {

    let url = document.getElementById("urlInput").value.trim();

    if (!url) {
        alert("Masukkan URL channel YouTube");
        return;
    }

    saveHistory(url);

    result.innerHTML = "";
    loading.innerHTML = "⏳ Mengambil data channel...";

    try {

        // ==========================
        // FETCH CHANNEL HTML
        // ==========================
        const proxy =
            "https://corsproxy.io/?" +
            encodeURIComponent(url);

        const res = await fetch(proxy);

        const html = await res.text();

        // ==========================
        // AMBIL CHANNEL ID
        // ==========================
        let channelId = null;

        const regex =
            /"channelId":"(UC[a-zA-Z0-9_-]+)"/;

        const match = html.match(regex);

        if (match) {
            channelId = match[1];
        }

        if (!channelId) {
            loading.innerHTML =
                "❌ Channel ID tidak ditemukan";
            return;
        }

        loading.innerHTML =
            "📡 Mengambil RSS feed...";

        // ==========================
        // RSS FEED
        // ==========================
        const rssUrl =
            "https://www.youtube.com/feeds/videos.xml?channel_id=" +
            channelId;

        const rssProxy =
            "https://corsproxy.io/?" +
            encodeURIComponent(rssUrl);

        const rssRes = await fetch(rssProxy);

        const xmlText = await rssRes.text();

        const parser = new DOMParser();

        const xml =
            parser.parseFromString(
                xmlText,
                "application/xml"
            );

        const entries =
            xml.querySelectorAll("entry");

        if (entries.length === 0) {

            loading.innerHTML =
                "❌ Video tidak ditemukan";

            return;
        }

        loading.innerHTML =
            `🎬 Ditemukan ${entries.length} video`;

        entries.forEach(entry => {

            const videoId =
                entry.querySelector("video\\:videoId")
                ?.textContent;

            const title =
                entry.querySelector("title")
                ?.textContent;

            const published =
                entry.querySelector("published")
                ?.textContent;

            const thumb =
                `https://i.ytimg.com/vi/${videoId}/maxresdefault.jpg`;

            const card = document.createElement("div");

            card.className = "thumb";

            card.innerHTML = `

                <img
                    src="${thumb}"
                    loading="lazy"
                    onerror="
                        this.src='https://i.ytimg.com/vi/${videoId}/hqdefault.jpg'
                    "
                >

                <div class="title">
                    ${escapeHtml(title)}
                </div>

                <div class="small">
                    📅 ${formatDate(published)}
                </div>

                <div class="actions">

                    <a
                        class="download"
                        href="${thumb}"
                        download="${sanitize(title)}.jpg"
                    >
                        ⬇ Download
                    </a>

                    <button
                        class="copybtn"
                        onclick="copyImage('${thumb}', this)"
                    >
                        📋 Copy Image
                    </button>

                </div>

            `;

            result.appendChild(card);

        });

    } catch (err) {

        console.error(err);

        loading.innerHTML =
            "❌ Gagal mengambil data";
    }
}



// ========================================
// COPY IMAGE
// ========================================
async function copyImage(url, btn) {

    try {

        const response =
            await fetch(url);

        const blob =
            await response.blob();

        await navigator.clipboard.write([
            new ClipboardItem({
                [blob.type]: blob
            })
        ]);

        const old = btn.innerHTML;

        btn.innerHTML = "✅ Copied!";

        setTimeout(() => {
            btn.innerHTML = old;
        }, 1500);

    } catch (err) {

        console.error(err);

        alert("❌ Copy gagal");
    }
}



// ========================================
// HISTORY LOCAL STORAGE
// ========================================
function saveHistory(url) {

    let history =
        JSON.parse(
            localStorage.getItem("yt_history")
        ) || [];

    if (!history.includes(url)) {
        history.unshift(url);
    }

    history = history.slice(0, 20);

    localStorage.setItem(
        "yt_history",
        JSON.stringify(history)
    );

    loadHistory();
}

function loadHistory() {

    const history =
        JSON.parse(
            localStorage.getItem("yt_history")
        ) || [];

    historyList.innerHTML = "";

    history.forEach(url => {

        const a =
            document.createElement("a");

        a.href = "#";

        a.className = "history-item";

        a.innerText = url;

        a.onclick = () => {

            document.getElementById(
                "urlInput"
            ).value = url;

            loadChannel();
        };

        historyList.appendChild(a);

    });
}



// ========================================
// HELPERS
// ========================================
function sanitize(str) {

    return str
        .replace(/[^a-zA-Z0-9\- ]/g, "")
        .substring(0, 50);
}

function escapeHtml(text) {

    return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

function formatDate(dateStr) {

    const date =
        new Date(dateStr);

    return date.toLocaleDateString(
        "id-ID",
        {
            day:"numeric",
            month:"long",
            year:"numeric"
        }
    );
}

</script>

</body>
</html>
