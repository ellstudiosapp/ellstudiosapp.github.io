<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Thumbnail Scraper</title>

<style>
    *{
        box-sizing:border-box;
    }

    body{
        margin:0;
        padding:30px;
        background:#0f0f0f;
        font-family:Arial, sans-serif;
        color:white;
        text-align:center;
    }

    h2{
        margin-bottom:20px;
    }

    .search-box{
        display:flex;
        justify-content:center;
        gap:10px;
        flex-wrap:wrap;
        margin-bottom:25px;
    }

    input{
        width:600px;
        max-width:100%;
        padding:14px;
        border:none;
        border-radius:10px;
        outline:none;
        background:#1c1c1c;
        color:white;
        font-size:15px;
    }

    button{
        border:none;
        padding:14px 20px;
        border-radius:10px;
        cursor:pointer;
        font-weight:bold;
    }

    .search-btn{
        background:#00ffc3;
        color:#000;
    }

    .thumb-container{
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        gap:20px;
        margin-top:30px;
    }

    .thumb{
        width:340px;
        background:#1b1b1b;
        border-radius:14px;
        padding:12px;
        box-shadow:0 0 10px rgba(0,0,0,0.4);
    }

    .thumb img{
        width:100%;
        border-radius:10px;
    }

    .title{
        font-weight:bold;
        margin-top:10px;
        font-size:15px;
    }

    .views{
        color:#aaa;
        margin-top:5px;
        font-size:13px;
    }

    .actions{
        margin-top:12px;
        display:flex;
        gap:10px;
        justify-content:center;
        flex-wrap:wrap;
    }

    .download{
        background:#00ffc3;
        color:black;
        text-decoration:none;
        padding:10px 14px;
        border-radius:8px;
        font-size:14px;
        font-weight:bold;
    }

    .copybtn{
        background:#ffb100;
        color:black;
    }

    .history{
        margin-top:50px;
    }

    .history h3{
        margin-bottom:15px;
    }

    .history-item{
        display:block;
        color:#00ffc3;
        margin:8px 0;
        text-decoration:none;
        word-break:break-all;
    }

    .loading{
        margin-top:20px;
        color:#00ffc3;
    }
</style>
</head>

<body>

<h2>🔥 YouTube Thumbnail Scraper</h2>

<div class="search-box">
    <input 
        type="text" 
        id="urlInput"
        placeholder="Masukkan URL Channel YouTube /videos"
    >
    <button class="search-btn" onclick="fetchThumbnails()">
        Ambil Thumbnail
    </button>
</div>

<div id="loading" class="loading"></div>

<div id="result" class="thumb-container"></div>

<div class="history">
    <h3>📜 History Pencarian</h3>
    <div id="historyList"></div>
</div>

<script>

const result = document.getElementById("result");
const loading = document.getElementById("loading");
const historyList = document.getElementById("historyList");

loadHistory();

async function fetchThumbnails() {

    let url = document.getElementById("urlInput").value.trim();

    if (!url) {
        alert("Masukkan URL terlebih dahulu");
        return;
    }

    // Auto tambah /videos
    if (!url.includes("/videos")) {
        url = url.replace(/\/$/, "") + "/videos";
    }

    saveHistory(url);

    result.innerHTML = "";
    loading.innerHTML = "⏳ Mengambil data...";

    try {

        // Gunakan proxy publik supaya tidak kena CORS
        const proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);

        const res = await fetch(proxy);
        const html = await res.text();

        if (!html) {
            loading.innerHTML = "❌ Gagal mengambil data";
            return;
        }

        // Ambil semua videoId
        const matches = [...html.matchAll(/"videoId":"(.*?)"/g)];

        const ids = [...new Set(
            matches
                .map(m => m[1])
                .filter(id => id.length === 11)
        )];

        if (ids.length === 0) {
            loading.innerHTML = "❌ Thumbnail tidak ditemukan";
            return;
        }

        loading.innerHTML = `🎬 Ditemukan ${ids.length} thumbnail`;

        // Ambil judul video
        const titleMatches = [...html.matchAll(/"title":{"runs":\[{"text":"(.*?)"/g)];

        ids.forEach((id, index) => {

            const title = titleMatches[index]
                ? decodeHTML(titleMatches[index][1])
                : "No title";

            const thumb = `https://i.ytimg.com/vi/${id}/maxresdefault.jpg`;

            result.innerHTML += `
                <div class="thumb">

                    <img 
                        src="${thumb}" 
                        loading="lazy"
                        onerror="this.src='https://i.ytimg.com/vi/${id}/hqdefault.jpg'"
                    >

                    <div class="title">${escapeHtml(title)}</div>

                    <div class="actions">

                        <a 
                            class="download"
                            href="${thumb}"
                            download="${sanitize(title)}.jpg"
                        >
                            ⬇ Download
                        </a>

                        <button 
                            class="copybtn"
                            onclick="copyImage('${thumb}', this)"
                        >
                            📋 Copy Image
                        </button>

                    </div>

                </div>
            `;
        });

    } catch (err) {
        console.error(err);
        loading.innerHTML = "❌ Gagal mengambil data (kemungkinan diblokir CORS)";
    }
}

function sanitize(str) {
    return str.replace(/[^a-zA-Z0-9\- ]/g, "").substring(0, 50);
}

function escapeHtml(text) {
    return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

function decodeHTML(html) {
    const txt = document.createElement("textarea");
    txt.innerHTML = html;
    return txt.value;
}

// ==========================
// COPY IMAGE
// ==========================
async function copyImage(url, btn) {

    try {

        const res = await fetch(url);
        const blob = await res.blob();

        await navigator.clipboard.write([
            new ClipboardItem({
                [blob.type]: blob
            })
        ]);

        const old = btn.innerHTML;

        btn.innerHTML = "✅ Copied!";

        setTimeout(() => {
            btn.innerHTML = old;
        }, 1500);

    } catch (err) {

        console.error(err);
        alert("❌ Gagal copy image");
    }
}

// ==========================
// LOCAL STORAGE HISTORY
// ==========================
function saveHistory(url) {

    let history = JSON.parse(localStorage.getItem("yt_history")) || [];

    if (!history.includes(url)) {
        history.unshift(url);
    }

    // Batasi 20 history
    history = history.slice(0, 20);

    localStorage.setItem("yt_history", JSON.stringify(history));

    loadHistory();
}

function loadHistory() {

    const history = JSON.parse(localStorage.getItem("yt_history")) || [];

    historyList.innerHTML = "";

    history.forEach(url => {

        const a = document.createElement("a");

        a.href = "#";
        a.className = "history-item";
        a.innerText = url;

        a.onclick = () => {
            document.getElementById("urlInput").value = url;
            fetchThumbnails();
        };

        historyList.appendChild(a);
    });
}

</script>

</body>
</html>
